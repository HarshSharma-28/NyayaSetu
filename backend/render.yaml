services:
  - type: web
    name: nyayasetu-backend
    runtime: python
    region: singapore  # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn app.main:app 
      --host 0.0.0.0 
      --port $PORT 
      --workers 1
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_MODE
        value: "true"
      - key: ENVIRONMENT
        value: "production"
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
